<text x="780.0" y="162" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">a [15:0]        b [15:0]        cin</text>
<line x1="780.0" y1="184" x2="780.0" y2="210" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="245.0" y1="210" x2="1295.0" y2="210" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="245.0" y1="210" x2="245.0" y2="232" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="245.0" y="220" font-size="11.5" font-weight="normal" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">a[3:0], b[3:0]</text>
<rect x="90" y="250" width="310" height="148" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="245.0" y="276" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">4-bit Ripple Carry Adder</text>
<text x="245.0" y="298" font-size="11.5" font-weight="normal" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">generate block b0  (i = 0..3)</text>
<text x="245.0" y="318" font-size="11.5" font-weight="normal" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">cin = cin  (module input)</text>
<text x="245.0" y="338" font-size="10.5" font-weight="normal" fill="#3C8A76" text-anchor="middle" dominant-baseline="central">full_adder x4, chained</text>
<line x1="245.0" y1="398" x2="245.0" y2="458" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="245.0" y="474" font-size="12.5" font-weight="500" fill="#8A5A00" text-anchor="middle" dominant-baseline="central">sum[3:0]</text>
<line x1="595.0" y1="210" x2="595.0" y2="232" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="595.0" y="220" font-size="11.5" font-weight="normal" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">a[7:4], b[7:4]</text>
