<text x="1027.5" y="272" font-size="12.5" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">RCA (cin=1)</text>
<text x="1027.5" y="292" font-size="10.5" font-weight="normal" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">b2_1</text>
<text x="1027.5" y="306" font-size="9.5" font-weight="normal" fill="#3C8A76" text-anchor="middle" dominant-baseline="central">sum_1, cout_1</text>
<line x1="862.5" y1="318" x2="862.5" y2="352" stroke="#5F5E5A" stroke-width="1.5"/>
<line x1="1027.5" y1="318" x2="1027.5" y2="352" stroke="#5F5E5A" stroke-width="1.5"/>
<rect x="790" y="352" width="310" height="46" rx="8" fill="#F3E8FB" stroke="#7B4FA0" stroke-width="0.5"/>
<text x="945.0" y="370" font-size="12.5" font-weight="500" fill="#5B2E82" text-anchor="middle" dominant-baseline="central">2:1 MUX</text>
<text x="945.0" y="386" font-size="10.5" font-weight="normal" fill="#7B4FA0" text-anchor="middle" dominant-baseline="central">sel = c8</text>
<line x1="945.0" y1="398" x2="945.0" y2="458" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="945.0" y="474" font-size="12.5" font-weight="500" fill="#8A5A00" text-anchor="middle" dominant-baseline="central">sum[11:8]</text>
