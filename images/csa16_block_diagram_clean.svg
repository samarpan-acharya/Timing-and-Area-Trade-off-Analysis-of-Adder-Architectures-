<svg width="1560" height="980" viewBox="0 0 1560 980" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
<title>Block diagram of csa_16bit module</title>
<desc>Structural diagram of a 16-bit carry select adder: one 4-bit ripple carry block followed by three carry-select blocks, each with dual 4-bit adders and a 2:1 multiplexer.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#B5690A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="1560" height="980" fill="#FFFFFF"/>
<rect x="30" y="60" width="1500" height="890" rx="20" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="60" y="90" font-size="17" font-weight="600" fill="#2C2C2A" text-anchor="start" dominant-baseline="central">16-bit Carry Select Adder  —  csa_16bit</text>
<text x="60" y="112" font-size="12.5" font-weight="normal" fill="#5F5E5A" text-anchor="start" dominant-baseline="central">Block 0: 4-bit ripple carry adder     Blocks 1-3: dual 4-bit adders (cin=0 / cin=1) + 2:1 mux, selected by previous carry-out</text>
